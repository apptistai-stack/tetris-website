<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="game-container">
            <div class="sidebar left">
                <div class="panel hold-panel">
                    <h2>HOLD</h2>
                    <canvas id="hold-canvas" width="80" height="80"></canvas>
                </div>
                <div class="panel score-panel">
                    <h2>SCORE</h2>
                    <div id="score">0</div>
                    <h2>LEVEL</h2>
                    <div id="level">1</div>
                    <h2>LINES</h2>
                    <div id="lines">0</div>
                </div>
            </div>

            <div class="board-wrapper">
                <canvas id="game-board" width="300" height="600"></canvas>
                <div id="game-overlay" class="overlay hidden">
                    <h1 id="overlay-title">PAUSED</h1>
                    <div id="pause-content">
                        <p>Press <span class="key">ESC</span> to Resume</p>
                    </div>

                    <div id="game-over-content" class="hidden">
                        <p>Final Score: <span id="final-score">0</span></p>
                        <div class="input-group">
                            <input type="text" id="player-name" placeholder="Enter Name" maxlength="10">
                            <button id="submit-score-btn">Submit Score</button>
                        </div>
                        <div id="leaderboard-section" class="hidden">
                            <h3>High Scores</h3>
                            <ul id="leaderboard-list">Loading...</ul>
                        </div>
                        <button id="restart-btn">Try Again</button>
                    </div>
                </div>
            </div>

            <div class="sidebar right">
                <div class="panel next-panel">
                    <h2>NEXT</h2>
                    <canvas id="next-canvas" width="80" height="240"></canvas>
                </div>
                <div class="panel controls-panel">
                    <h3>Controls</h3>
                    <div class="control-row"><span class="key">←</span> <span class="key">→</span> Move</div>
                    <div class="control-row"><span class="key">↑</span> Rotate</div>
                    <div class="control-row"><span class="key">↓</span> Soft Drop</div>
                    <div class="control-row"><span class="key">SPACE</span> Hard Drop</div>
                    <div class="control-row"><span class="key">C</span> Hold</div>
                    <div class="control-row"><span class="key">ESC</span> Pause</div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>

</html>
